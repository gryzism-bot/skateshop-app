services:

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - FRONTEND_URL=${FRONTEND_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products"]
      interval: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        - NGINX_API_PROXY=${NGINX_API_PROXY}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy

  playwright:
    build: ./playwright
    environment:
      - API_URL: http://backend:8080/api
      - UI_URL: http://frontend:4200
      - DOCKER: true
      - PLAYWRIGHT_UI_HOST=0.0.0.0
    ports:
    - "9323:9323"
    depends_on:
      backend:
        condition: service_healthy
    # command: ["npx", "playwright", "test"]